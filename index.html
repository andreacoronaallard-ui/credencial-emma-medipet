<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediPet Wallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#eef2f5;
  display:flex;
  justify-content:center;
}

.card{
  width:820px;
  border-radius:25px;
  overflow:hidden;
  background:#f4f5f6;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}

/* HEADER */
.header{
  background:#284a78;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:60px;
  background:white;
  border-radius:12px;
  padding:5px;
}

.brand h1{
  color:white;
  margin:0;
}

.brand span{color:#eba85a;}

.badge{
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
}

.status-pending{
  background:#fff4d6;
  color:#9a6700;
}

.status-active{
  background:#e7f5ea;
  color:#2c6b2b;
}

.policy{
  background:#eba85a;
  color:white;
  padding:10px;
  border-radius:15px;
  margin-top:5px;
  text-decoration:none;
  display:inline-block;
}

/* CONTENT */
.content{
  display:grid;
  grid-template-columns:250px 1fr;
  gap:20px;
  padding:20px;
}

.photo img{
  width:100%;
  border-radius:20px;
}

h2{
  font-size:60px;
  margin:0;
}

.label{
  color:#777;
  margin-top:10px;
}

.owner{
  font-weight:bold;
  color:#284a78;
}

/* MINI */
.mini{
  display:inline-block;
  background:#eaecef;
  padding:10px;
  margin:5px;
  border-radius:10px;
  font-size:14px;
}

/* BOTÓN PAGO */
.pay-button{
  display:block;
  margin-top:10px;
  background:#2e7d82;
  color:white;
  text-decoration:none;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

/* FOOTER */
.bottom{
  display:grid;
  grid-template-columns:1fr 1fr 120px;
  background:linear-gradient(90deg,#eb9346,#2e7d82);
  padding:15px;
  color:white;
  align-items:center;
}

.qr{
  background:white;
  padding:5px;
  border-radius:10px;
  animation:glow 2.5s infinite;
}

.qr img{
  width:100%;
}

@keyframes glow{
  0%{box-shadow:0 0 0 rgba(235,168,90,0);}
  50%{box-shadow:0 0 15px rgba(235,168,90,.4);}
  100%{box-shadow:0 0 0 rgba(235,168,90,0);}
}

.note{
  text-align:center;
  font-size:12px;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="card">

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <img src="https://lh3.googleusercontent.com/d/1uZoXweyZOLxWUCflHuNhFiOj3oNuHyeB">
    <h1>Medi<span>Pet</span></h1>
  </div>

  <div>
    <div id="status" class="badge status-pending">Pendiente de pago</div><br>

    <a id="policyLink" class="policy" target="_blank">
      Póliza: <span id="poliza">-</span>
    </a>

    <a id="payButton" class="pay-button" target="_blank">
      Realizar pago
    </a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="photo">
    <img id="foto" src="https://lh3.googleusercontent.com/d/1NM1rtfZN8bTyKQCbFUKFQImD_ob1ROVv">
  </div>

  <div>
    <h2 id="mascota">MASCOTA</h2>
    <div id="raza">Raza</div>

    <div class="label">Asegurado</div>
    <div id="asegurado" class="owner">Nombre</div>

    <div>
      <div class="mini">🐾 <span id="especie">-</span></div>
      <div class="mini">Sexo: <span id="sexo">-</span></div>
      <div class="mini">Color: <span id="color">-</span></div>
      <div class="mini">Edad: <span id="edad">-</span></div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="bottom">

  <div>📞 Asistencias<br>55 4161 6998</div>
  <div>⚠ Reporte<br>55 4161 6998</div>

  <div class="qr">
    <a href="https://wa.me/message/4BZFEGQSTZVNJ1" target="_blank">
      <img src="https://lh3.googleusercontent.com/d/1SyTqBcmTM7KDAoVpVYLdV_A1avkWtcvx">
    </a>
    <div class="note">Escanea o da click para reportar</div>
  </div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

// VARIABLES
const mascota = params.get("mascota");
const especie = params.get("especie");
const raza = params.get("raza");
const asegurado = params.get("asegurado");
const sexo = params.get("sexo");
const color = params.get("color");
const edad = params.get("edad");
const poliza = params.get("poliza");
const foto = params.get("foto");
const pdf = params.get("pdf");
const estatus = params.get("estatus");

// SET DATA
if(mascota){
  document.getElementById("mascota").innerText = mascota.toUpperCase();
  document.title = "MediPet " + mascota;
}

if(raza) document.getElementById("raza").innerText = raza;
if(asegurado) document.getElementById("asegurado").innerText = asegurado;
if(sexo) document.getElementById("sexo").innerText = sexo;
if(color) document.getElementById("color").innerText = color;
if(edad) document.getElementById("edad").innerText = edad;
if(poliza) document.getElementById("poliza").innerText = poliza;

if(foto) document.getElementById("foto").src = foto;

if(pdf) document.getElementById("policyLink").href = pdf;

// ESPECIE
if(especie){
  let e = especie.toLowerCase();
  document.getElementById("especie").innerText = (e === "gato") ? "🐱 Gato" : "🐶 Perro";
}

// ESTATUS
const statusEl = document.getElementById("status");
const payBtn = document.getElementById("payButton");

if(estatus === "activa"){
  statusEl.innerText = "Póliza activa";
  statusEl.classList.remove("status-pending");
  statusEl.classList.add("status-active");
  payBtn.style.display = "none";
}else{
  payBtn.href = "https://ews.gmx.com.mx/CO-DIG/pagoenlinea.aspx";
}
</script>

</body>
</html>
